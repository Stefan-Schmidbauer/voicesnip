# Quickstrap Installation Profiles Configuration
#
# This file configures how VoiceSnip will be installed.
# Linux-only, local-execution STT client with CUDA and ROCm GPU backends.

[metadata]
# REQUIRED: Display name of your application
app_name = VoiceSnip

# REQUIRED: Directory name for storing installation info
# Linux: ~/.config/{config_dir}/
# Use lowercase with hyphens (e.g., my-app, desktop-tool, data-manager)
config_dir = voicesnip

# Platform support: Linux only
supported_platforms = linux

# REQUIRED: Command to start your application
start_command_linux = python3 main.py

# OPTIONAL: Message shown after successful installation
after_install_linux = Start VoiceSnip with: ./start.sh


# ==============================================================================
# Installation Profiles
# ==============================================================================
# Each profile configures a different GPU backend for local Whisper execution.

[profile:cuda]
name = CUDA (GPU-accelerated)
description = Local Whisper with NVIDIA GPU acceleration. Requires NVIDIA GPU with CUDA.
features = whisper,cuda
python_requirements_linux = quickstrap/requirements_python_cuda.txt
system_requirements_linux = quickstrap/requirements_system_cuda.txt
pre_install_scripts_linux = quickstrap/scripts/check_nvidia_cuda.sh
post_install_scripts_linux = quickstrap/scripts/setup_cuda_venv_activate.sh

[profile:rocm]
name = ROCm (AMD GPU-accelerated)
description = Local Whisper with AMD GPU acceleration. Requires AMD GPU with ROCm.
features = whisper,rocm
python_requirements_linux = quickstrap/requirements_python_rocm.txt
system_requirements_linux = quickstrap/requirements_system_rocm.txt
pre_install_scripts_linux = quickstrap/scripts/check_rocm.sh
post_install_scripts_linux = quickstrap/scripts/setup_rocm_pytorch.sh

